<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <br><br>
    <div class="text-center">
    <h1>Heat Index Checker</h1>
    </div>
     <div class="container">
        <br>



     <div class="rounded-5 text-center mx-auto" style="width: 300px;">
     <input type="number" id="degreeC" class="form-control" placeholder="Degree in Celsius">
     <br><br>
     <input type="number" id="Humidity%" class="form-control" placeholder="Humidity in %">
     <br><br>
    <button class="btn btn-info" onclick="Check()">Check</button>
        </div>
    </div>
    <script>

            function Check(){
                var temperature = document.getElementById("degreeC").value;
                var humidity = document.getElementById("Humidity%").value;
                var Check = temperature + (0.33 * humidity) - 4; 
                
                message = ""; 

                switch(true){
                    case (Check <= "27"):
                        message = "It's cool outside.";
                        break;
                    case (Check <= "28"):
                        message = "A lil warm today.";
                        break;
                    case (Check <= "33"):
                        message = "Alright, starting to sweat now.";
                        break;
                    case (Check <= "38"):
                        message = "Start turning on your air conditoners.";
                        break;
                    case (Check >= "42"):
                        message = "I'M BURNIN' UP!";
                        break;
                    default:
                        message = "Heat couldn't be checked.";
                }
                    alert(message);
            }

            </script>
    
</body>
</html>
