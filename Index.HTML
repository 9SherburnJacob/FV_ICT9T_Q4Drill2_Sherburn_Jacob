<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        form{ 
            background-color:rgb(112, 62, 62);
            position: absolute;
            top: 10%;
            left: 33%;
            width: 500px;
            height: 500px;
            border-radius: 20px;
        }
        body{
            background-image: url('https://media.istockphoto.com/id/1489640105/video/the-weather-forecast-interface-on-the-digital-screen-shows-the-storm-global-warming-concept.jpg?s=640x640&k=20&c=9xgFWt1wuCICPNVZVxpZW-jtkU4kiwHog_X6OXxN2Zk=');
            background-repeat: no-repeat;
            background-size: cover;
        }
    </style>
</head>
<body>

    <form>
    <br><br>
    <div class="text-center">
    <h1>Heat Index Checker</h1>
     <div class="container">
    <br>
    <details ontoggle="">
        <summary>Instructions</summary>
        <p>Input a celsius value and humidity value to see how hot the checker deems it.</p>
    </details>
    </div>
    <br>

     <div class="rounded-5 text-center mx-auto" style="width: 300px;">
     <input type="number" id="tempy" class="form-control" placeholder="Degree in Celsius">
     <br><br>
     <input type="number" id="humy" class="form-control" placeholder="Humidity in %">
     <br><br>
    <button class="btn btn-warning" onclick="Check()">Check the heat</button>
        </div>
    </div>
    <script>

            function Check() {
                var tempy = parseFloat(document.getElementById("tempy").value);
                var humy = parseFloat(document.getElementById("humy").value);
                var Check = tempy + (0.33 * humy) - 4; 
                
                message = ""; 

                switch(true){
                    case (Check <= 27):
                        message = "It's cool outside.";
                        break;
                    case (Check >= 28 && Check <= 32):
                        message = "A lil warm today.";
                        break;
                    case (Check >= 33 && Check <=37):
                        message = "Alright, starting to sweat now.";
                        break;
                    case (Check >= 38 && Check <=41):
                        message = "Start turning on your air conditoners.";
                        break;
                    case (Check >= 42):
                        message = "I'M BURNIN' UP!";
                        break;
                    default:
                        message = "Heat couldn't be checked.";
                }
                    alert("The heat index is: " + Check.toFixed(2) + "\n" + message);
            }

            </script>
            </form>
    
</body>
</html>
